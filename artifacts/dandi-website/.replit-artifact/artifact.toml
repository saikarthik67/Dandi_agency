kind = "web"
previewPath = "/"
title = "Dandi Website"
version = "1.0.0"
id = "artifacts/dandi-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18142

[services.development]
run = "pnpm --filter @workspace/dandi-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dandi-website", "run", "build" ]
publicDir = "artifacts/dandi-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18142"
BASE_PATH = "/"
